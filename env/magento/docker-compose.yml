version: "3.8"

services:
  # MySQL server
  mysql:
    image: mysql:5.7
    container_name: magento-demo-mysql
    networks:
      - magento-demo-network
    ports:
      - "3306:3306"
    volumes:
      - magento-demo-mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: magento_user
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: magento_demo

  # Elasticsearch server
  elasticsearch:
    image: elasticsearch:7.8.1
    container_name: magento-demo-elasticsearch
    networks:
      - magento-demo-network
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node

  # Magento server
  web:
    image: bitnami/magento:latest
    container_name: magento-demo-web
    networks:
      - magento-demo-network
    ports:
      - "80:80"
      - "8080:8080"
      - "443:443"
      - "8443:8443"   
    environment:
      - MARIADB_HOST=mysql
      - MARIADB_PORT_NUMBER=3306
      - MAGENTO_DATABASE_USER=magento_user
      - MAGENTO_DATABASE_PASSWORD=password
      - MAGENTO_DATABASE_NAME=magento_demo
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT_NUMBER=9200
    volumes:
      - magento_data:/bitnami/magento

volumes:
  magento-demo-mysql-data:
  magento_data:

networks:
  magento-demo-network:
